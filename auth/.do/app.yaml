# DigitalOcean App Platform spec for auth.absolutejs.com — the public
# AbsoluteJS auth reference deployment. Doubles as:
#  - The OIDC issuer for any RP that wants to test against a real
#    @absolutejs/auth provider
#  - The target the OpenID Foundation conformance suite hits during
#    certification (see ../auth/conformance/README.md)
#  - The live demo for the showcase pages (React/Vue/Svelte/Angular/HTML/HTMX)
#
# Deploy:
#   doctl apps create --spec .do/app.yaml
#   # …or in the dashboard: Apps → Create → from GitHub → absolutejs/examples
#
# After first deploy:
#   1. Set the SECRET env vars below via `doctl apps update` or the
#      dashboard.
#   2. CNAME auth.absolutejs.com → the App URL.
#   3. Confirm GET /.well-known/openid-configuration responds 200 over HTTPS.
#   4. From ~/abs/auth:
#        TARGET_ISSUER=https://auth.absolutejs.com ./conformance/run.sh

name: auth-absolutejs
region: nyc

services:
  - name: web
    github:
      repo: absolutejs/examples
      branch: main
      deploy_on_push: true
    source_dir: auth
    dockerfile_path: auth/Dockerfile
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 3000

    health_check:
      http_path: /.well-known/openid-configuration

    envs:
      - key: ISSUER
        scope: RUN_AND_BUILD_TIME
        value: https://auth.absolutejs.com
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SESSION_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: OIDC_SIGNING_KEY_JWK
        scope: RUN_AND_BUILD_TIME
        type: SECRET

domains:
  - domain: auth.absolutejs.com
    type: PRIMARY
    zone: absolutejs.com
