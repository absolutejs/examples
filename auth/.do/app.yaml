# DigitalOcean App Platform spec for the OpenID Conformance reference
# instance — deploys auth/ from this repo as a public HTTPS endpoint
# the conformance suite can target.
#
# Deploy:
#   doctl apps create --spec .do/app.yaml
#   # …or in the dashboard: Apps → Create → from GitHub → absolutejs/examples
#
# After first deploy:
#   1. Set the env vars listed below (DATABASE_URL, SESSION_SECRET, etc.)
#      via `doctl apps update` or the dashboard. They're declared as
#      SECRET so they don't appear in this committed spec.
#   2. Point oidc-conformance.absolutejs.com (CNAME) at the App URL.
#   3. Confirm GET /.well-known/openid-configuration responds 200 over HTTPS.
#   4. Run ../auth/conformance/run.sh with
#      TARGET_ISSUER=https://oidc-conformance.absolutejs.com

name: oidc-conformance
region: nyc

services:
  - name: web
    github:
      repo: absolutejs/examples
      branch: main
      deploy_on_push: true
    source_dir: auth
    dockerfile_path: auth/Dockerfile
    instance_size_slug: basic-xs
    instance_count: 1
    http_port: 3000

    health_check:
      http_path: /.well-known/openid-configuration

    envs:
      - key: ISSUER
        scope: RUN_AND_BUILD_TIME
        value: https://oidc-conformance.absolutejs.com
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SESSION_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: OIDC_SIGNING_KEY_JWK
        scope: RUN_AND_BUILD_TIME
        type: SECRET

domains:
  - domain: oidc-conformance.absolutejs.com
    type: PRIMARY
    zone: absolutejs.com
