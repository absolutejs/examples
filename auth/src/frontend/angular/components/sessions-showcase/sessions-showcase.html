<section class="auth-section stack">
  <div>
    <h1 class="page-heading">Sessions</h1>
    <p class="muted">
      Every active session for the signed-in user. Revoke any device remotely;
      the affected client&apos;s next request returns 401.
    </p>
  </div>

  <div class="stack">
    <button class="button" type="button" (click)="refresh()">Refresh</button>
    <p *ngIf="pending()" class="muted">Loading…</p>
    <p *ngIf="error() !== null" class="auth-error" role="alert">
      {{ error() }}
    </p>
    <p *ngIf="!pending() && sessions().length === 0" class="muted">
      No active sessions returned (you may not be signed in).
    </p>
    <ul class="stack">
      <li
        *ngFor="let session of sessions()"
        class="showcase-card--lg"
        [attr.data-session-id]="session.id"
      >
        <div class="showcase-monospace">{{ session.id }}</div>
        <div *ngIf="session.userAgent" class="muted">
          {{ session.userAgent }}
        </div>
        <div *ngIf="session.ip" class="muted">IP: {{ session.ip }}</div>
        <button class="button" type="button" (click)="revoke(session.id)">
          Revoke
        </button>
      </li>
    </ul>
  </div>
</section>
