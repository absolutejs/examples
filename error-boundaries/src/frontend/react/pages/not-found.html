<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>404 - Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="/assets/ico/favicon.ico" rel="icon" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      img {
        display: block;
        max-width: 100%;
        height: auto;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: #0a0a0f;
        color: #e4e4e7;
        font-family: "Inter", system-ui, sans-serif;
        line-height: 1.6;
        display: flex;
        flex-direction: column;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 1.5rem;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        width: 100%;
      }
      .code {
        font-size: 6rem;
        font-weight: 700;
        background: linear-gradient(135deg, #fbbf24 0%, #f87171 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        letter-spacing: -0.05em;
      }
      h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 1rem 0 0.5rem;
      }
      p {
        color: #71717a;
        margin-bottom: 1.5rem;
      }
      .badge {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.25rem 0.75rem;
        border-radius: 9999px;
        background: rgba(251, 191, 36, 0.15);
        color: #fbbf24;
        font-family: monospace;
        margin-top: 0.5rem;
      }
      .back-link {
        display: inline-block;
        color: #5fbeeb;
        padding: 0.5rem 1.25rem;
        border-radius: 0.5rem;
        background: rgba(95, 190, 235, 0.1);
        border: 1px solid rgba(95, 190, 235, 0.2);
        font-size: 0.9rem;
      }
      .footer {
        margin-top: auto;
        padding-top: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        color: #52525b;
        font-size: 0.75rem;
        padding-bottom: 2rem;
      }
      .footer img {
        height: 16px;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="code">404</div>
      <h2>Page Not Found</h2>
      <span class="badge">not-found.html</span>
      <p>
        Universal HTML 404 fallback. Activates when no framework-specific
        not-found is registered.
      </p>
      <a class="back-link" href="/">Back to Home</a>

      <p class="footer">
        <img alt="" src="/assets/png/absolutejs-temp.png" />
        Powered by
        <a
          href="https://absolutejs.com"
          rel="noopener noreferrer"
          target="_blank"
          >AbsoluteJS</a
        >
      </p>
    </main>
  </body>
</html>
